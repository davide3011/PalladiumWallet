name: Feature Request
description: Suggest an idea or improvement for Palladium Wallet
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest an improvement.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve? Is it related to something you find missing or frustrating?
      placeholder: "I'm always frustrated when …"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe what you'd like to happen.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or workarounds you've considered.
    validations:
      required: false

  - type: dropdown
    id: platform
    attributes:
      label: Affected platform(s)
      multiple: true
      options:
        - Windows
        - Linux
        - Android
        - CLI
        - All
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
